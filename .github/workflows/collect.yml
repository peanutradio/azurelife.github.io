name: RSS 수집

on:
  schedule:
    # Azure       : 월/목 09:00 KST (= 00:00 UTC) — --board ms
    - cron: '0 0 * * 1,4'
    # GitHub      : 월/목 12:00 KST (= 03:00 UTC) — --board ms
    - cron: '0 3 * * 1,4'
    # AI Foundry  : 화/금 09:00 KST (= 00:00 UTC) — --board ms
    - cron: '0 0 * * 2,5'
    # Fabric      : 화/금 12:00 KST (= 03:00 UTC) — --board ms
    - cron: '0 3 * * 2,5'
    # 보안 & 컴플라이언스: 수/토 09:00 KST (= 00:00 UTC) — --board ms
    - cron: '0 0 * * 3,6'
    # M365 & Copilot     : 수/토 12:00 KST (= 03:00 UTC) — --board ms
    - cron: '0 3 * * 3,6'
    # IT 소식     : 매일 15:00 KST (= 06:00 UTC) — --board it
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      board:
        description: '수집할 게시판 (all / it / ms)'
        required: false
        default: 'all'

permissions:
  contents: write

concurrency:
  group: collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python 환경 세팅
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: 의존성 설치
        run: pip install -r scripts/requirements.txt

      - name: 수집 게시판 결정
        id: board
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "board=${{ github.event.inputs.board }}" >> "$GITHUB_OUTPUT"
          else
            HOUR=$(date -u +%H)
            DOW=$(date -u +%u)   # 1=월 … 7=일
            BOARD="all"
            # 매일 06:00 UTC → IT 소식 (15:00 KST)
            if [[ "$HOUR" == "06" ]]; then
              BOARD="it"
            # 00:00 / 03:00 UTC 어떤 요일이든 → MS 게시판
            elif [[ "$HOUR" == "00" || "$HOUR" == "03" ]]; then
              BOARD="ms"
            fi
            echo "board=$BOARD" >> "$GITHUB_OUTPUT"
          fi

      - name: RSS 수집
        run: python scripts/collect_rss.py --board ${{ steps.board.outputs.board }}

      - name: 새 포스트 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/ scripts/.published_urls.json 2>/dev/null || git add content/
          if git diff --cached --quiet; then
            echo "새 포스트 없음 — 커밋 생략"
          else
            POST_COUNT=$(git diff --cached --name-only -- 'content/**' | wc -l | tr -d ' ')
            git commit -m "feat: 새 포스트 ${POST_COUNT}건 수집 [board: ${{ steps.board.outputs.board }}]

          Co-Authored-By: Paperclip <noreply@paperclip.ing>"
            git pull --rebase
            git push
          fi
